<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="1017px" preserveAspectRatio="none" style="width:662px;height:1017px;background:#FFFFFF;" version="1.1" viewBox="0 0 662 1017" width="662px" zoomAndPan="magnify"><title>Input Validation &#8212; Defense in Depth Layers</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="315.4922" x="166.5361" y="23.5352">Input Validation &#8212; Defense in Depth Layers</text></g><!--entity L1--><g class="entity" data-qualified-name="L1" data-source-line="10" id="ent0002"><rect fill="#E3F2FD" height="135.418" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="339.7646" x="294.44" y="44.4883"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="56.1436" x="436.2505" y="68.0234">&#171;layer1&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="275.9805" x="304.44" y="84.5117">Layer 1 &#8212; Controller (Bean Validation)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="183.374" x="304.44" y="101">@Valid on DTO parameters</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="319.7646" x="304.44" y="117.4883">@NotNull, @NotBlank, @Email, @Size, @Pattern</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="258.8154" x="304.44" y="133.9766">@Min, @Max, @DecimalMin, @Positive</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="287.0342" x="304.44" y="150.4648">ConstraintViolationException &#8594; HTTP 400</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="94.8213" x="304.44" y="166.9531">(SR-28, T-56)</text></g><!--entity L2--><g class="entity" data-qualified-name="L2" data-source-line="12" id="ent0003"><rect fill="#E3F2FD" height="135.418" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="332.0264" x="189.31" y="240.9083"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="56.1436" x="327.2514" y="264.4434">&#171;layer1&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="245.7861" x="199.31" y="280.9317">Layer 2 &#8212; Jackson Deserialization</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="230.8975" x="199.31" y="297.42">fail-on-unknown-properties: true</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="312.0264" x="199.31" y="313.9083">@JsonIgnoreProperties(ignoreUnknown=false)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="283.7598" x="199.31" y="330.3966">@JsonIgnore on sensitive fields (unitPrice)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="210.0068" x="199.31" y="346.8848">Mass-assignment &#8594; HTTP 400</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="145.8789" x="199.31" y="363.3731">(SR-29, SR-50, T-43)</text></g><!--entity L3--><g class="entity" data-qualified-name="L3" data-source-line="14" id="ent0004"><rect fill="#FFF3E0" height="135.418" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="233.8828" x="158.38" y="468.3183"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="56.1436" x="247.2496" y="491.8534">&#171;layer2&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="213.8828" x="168.38" y="508.3417">Layer 3 &#8212; Application Service</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="188.7266" x="168.38" y="524.83">Server-side price resolution</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="162.1484" x="168.38" y="541.3183">from productRepository</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="185.6777" x="168.38" y="557.8066">Idempotency key validation</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="206.5547" x="168.38" y="574.2948">Optimistic/pessimistic locking</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="94.8213" x="168.38" y="590.7831">(SR-03, T-46)</text></g><!--entity L4--><g class="entity" data-qualified-name="L4" data-source-line="16" id="ent0005"><rect fill="#FFF3E0" height="118.9297" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="285.0566" x="18.8" y="695.7383"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="56.1436" x="133.2565" y="719.2734">&#171;layer2&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="204.9072" x="28.8" y="735.7617">Layer 4 &#8212; Repository / ORM</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="195.248" x="28.8" y="752.25">JPQL named parameters only</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="235.9355" x="28.8" y="768.7383">nativeQuery concatenation banned</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="265.0566" x="28.8" y="785.2266">by SpotBugs find-sec-bugs + ArchUnit</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="189.3965" x="28.8" y="801.7148">(SR-09, SR-10, T-39, T-72)</text></g><!--entity L5--><g class="entity" data-qualified-name="L5" data-source-line="18" id="ent0006"><rect fill="#E8F5E9" height="135.418" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="308.6475" x="7" y="875.6683"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="56.1436" x="133.252" y="899.2034">&#171;layer3&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="202.3096" x="17" y="915.6917">Layer 5 &#8212; Database Schema</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="202.1523" x="17" y="932.18">CHECK constraints (price &gt; 0)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="197.292" x="17" y="948.6683">NOT NULL on transaction_ref</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="288.6475" x="17" y="965.1566">MySQL user: SELECT, INSERT, UPDATE only</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="144.8535" x="17" y="981.6448">No DDL / GRANT ALL</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="153.4189" x="17" y="998.1331">(SR-20, SR-23, SR-47)</text></g><!--entity ERR--><g class="entity" data-qualified-name="ERR" data-source-line="20" id="ent0007"><rect fill="#F1F1F1" height="118.9297" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="276.4844" x="380.08" y="695.7383"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="109.2383" x="390.08" y="719.2734">Error Boundary</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="246.7637" x="390.08" y="735.7617">server.error.include-message: never</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="256.4844" x="390.08" y="752.25">server.error.include-stacktrace: never</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="201.626" x="390.08" y="768.7383">@RestControllerAdvice masks</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="143.7871" x="390.08" y="785.2266">DataAccessException</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="94.8213" x="390.08" y="801.7148">(SR-46, T-75)</text></g><!--link L1 to L2--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="22" id="lnk8"><path d="M426.66,180.3783 C415.77,199.7983 406.8147,215.7749 395.9247,235.1949" fill="none" id="L1-to-L2" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="392.99,240.4283,400.8809,234.5347,395.4355,236.0672,393.9031,230.6218,392.99,240.4283" style="stroke:#181818;stroke-width:1;"/></g><!--link L2 to L3--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="23" id="lnk9"><path d="M331.54,376.6383 C321.31,405.4483 311.3965,433.3937 301.1665,462.2237" fill="none" id="L2-to-L3" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="299.16,467.8783,305.9394,460.7341,300.832,463.1661,298.4,458.0588,299.16,467.8783" style="stroke:#181818;stroke-width:1;"/></g><!--link L3 to L4--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="24" id="lnk10"><path d="M240.19,603.9583 C224.82,633.2483 209.7287,661.9958 194.8887,690.2658" fill="none" id="L3-to-L4" style="stroke: