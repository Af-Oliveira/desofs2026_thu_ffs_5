<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="948px" preserveAspectRatio="none" style="width:352px;height:948px;background:#FFFFFF;" version="1.1" viewBox="0 0 352 948" width="352px" zoomAndPan="magnify"><title>Authorization Enforcement Chain &#8212; VendNet</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="324.8027" x="10" y="23.5352">Authorization Enforcement Chain &#8212; VendNet</text></g><!--entity REQ--><g class="entity" data-qualified-name="REQ" data-source-line="11" id="ent0002"><rect fill="#F1F1F1" height="52.9766" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="245.3057" x="57.2461" y="44.4883"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="101.5684" x="67.2461" y="68.0234">HTTP Request</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="225.3057" x="67.2461" y="84.5117">(from Client or Vending Machine)</text></g><!--entity JWT--><g class="entity" data-qualified-name="JWT" data-source-line="13" id="ent0003"><rect fill="#E8F5E9" height="118.9297" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="270.7012" x="44.5461" y="157.4683"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="46.6758" x="156.5588" y="181.0034">&#171;filter&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="167.0361" x="54.5461" y="197.4917">JwtAuthenticationFilter</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="178.7256" x="54.5461" y="213.98">Validates HS256 signature</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="210.6494" x="54.5461" y="230.4683">Rejects alg:none (SR-04, T-28)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="250.7012" x="54.5461" y="246.9566">Checks Redis blocklist (SR-47, T-35)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="236.4619" x="54.5461" y="263.4448">Loads role from DB (not JWT claim)</text></g><!--entity CTRL--><g class="entity" data-qualified-name="CTRL" data-source-line="15" id="ent0004"><rect fill="#E3F2FD" height="102.4414" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="312.2705" x="23.7661" y="336.3983"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="80.3154" x="139.7437" y="359.9334">&#171;controller&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="245.5811" x="33.7661" y="376.4217">@PreAuthorize &#8212; Controller Layer</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="182.4717" x="33.7661" y="392.91">hasRole('ADMINISTRATOR')</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="292.2705" x="33.7661" y="409.3983">hasAnyRole('OPERATOR','ADMINISTRATOR')</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="195.1387" x="33.7661" y="425.8866">permitAll() for public catalog</text></g><!--entity SVC--><g class="entity" data-qualified-name="SVC" data-source-line="17" id="ent0005"><rect fill="#FFF3E0" height="102.4414" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="263.0928" x="48.3561" y="498.8383"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="61.5986" x="149.1032" y="522.3734">&#171;service&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="223.8975" x="58.3561" y="538.8617">@PreAuthorize &#8212; Service Layer</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.4033" x="58.3561" y="555.35">@EnableMethodSecurity</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="243.0928" x="58.3561" y="571.8383">Catches internal / scheduled callers</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="138.3389" x="58.3561" y="588.3266">(SR-14, T-11, T-36)</text></g><!--entity MPE--><g class="entity" data-qualified-name="MPE" data-source-line="19" id="ent0006"><rect fill="#FFF3E0" height="102.4414" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="285.5281" x="37.1361" y="661.2783"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="61.5986" x="149.1009" y="684.8134">&#171;service&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="207.2383" x="47.1361" y="701.3017">MachinePermissionEvaluator</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="265.5281" x="47.1361" y="717.79">Operator &#8596; machine assignment check</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="229.0723" x="47.1361" y="734.2783">Returns HTTP 404 for unassigned</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="189.3965" x="47.1361" y="750.7666">(SR-44, SR-49, T-10, T-38)</text></g><!--entity DOM--><g class="entity" data-qualified-name="DOM" data-source-line="21" id="ent0007"><rect fill="#FCE4EC" height="118.9297" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="217.9141" x="70.9461" y="823.7183"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="65.6182" x="147.0941" y="847.2534">&#171;domain&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="132.5146" x="80.9461" y="863.7417">Domain Invariants</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="114.4541" x="80.9461" y="880.23">Slot.quantity &#8805; 0</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="118.8018" x="80.9461" y="896.7183">Product.price &gt; 0</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="197.9141" x="80.9461" y="913.2066">Sale.unitPrice = catalog price</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="145.8789" x="80.9461" y="929.6948">(SR-03, SR-23, T-46)</text></g><!--link REQ to JWT--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="23" id="lnk8"><path d="M179.9061,97.7083 C179.9061,114.2083 179.9061,130.3283 179.9061,150.9683" fill="none" id="REQ-to-JWT" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="179.9061,156.9683,183.9061,147.9683,179.9061,151.9683,175.9061,147.9683,179.9061,156.9683" style="stroke:#181818;stroke-width:1;"/></g><!--link JWT to CTRL--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="24" id="lnk9"><path d="M179.9061,276.4583 C179.9061,295.8683 179.9061,311.2983 179.9061,330.0583" fill="none" id="JWT-to-CTRL" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="179.9061,336.0583,183.9061,327.0583,179.9061,331.0583,175.9061,327.0583,179.9061,336.0583" style="stroke:#181818;stroke-width:1;"/></g><!--link CTRL 