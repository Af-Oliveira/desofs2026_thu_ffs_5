<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="1055px" preserveAspectRatio="none" style="width:1162px;height:1055px;background:#FFFFFF;" version="1.1" viewBox="0 0 1162 1055" width="1162px" zoomAndPan="magnify"><title>Logging Architecture &#8212; Event Flow &amp; Tamper Protection</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="406.1846" x="371.3351" y="23.5352">Logging Architecture &#8212; Event Flow &amp; Tamper Protection</text></g><!--entity S1--><g class="entity" data-qualified-name="S1" data-source-line="12" id="ent0002"><rect fill="#E3F2FD" height="69.4648" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="100.3975" x="157.44" y="118.8383"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="59.7939" x="177.7418" y="142.3734">&#171;source&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="80.3975" x="167.44" y="158.8617">Auth Events</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="51.3037" x="167.44" y="175.35">(SR-37)</text></g><!--entity S2--><g class="entity" data-qualified-name="S2" data-source-line="13" id="ent0003"><rect fill="#E3F2FD" height="69.4648" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="146.2256" x="292.53" y="118.8383"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="59.7939" x="335.7458" y="142.3734">&#171;source&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126.2256" x="302.53" y="158.8617">Inventory Changes</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="51.3037" x="302.53" y="175.35">(SR-38)</text></g><!--entity S3--><g class="entity" data-qualified-name="S3" data-source-line="14" id="ent0004"><rect fill="#E3F2FD" height="69.4648" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="112.1895" x="473.55" y="118.8383"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="59.7939" x="499.7478" y="142.3734">&#171;source&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="92.1895" x="483.55" y="158.8617">Role Changes</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="51.3037" x="483.55" y="175.35">(SR-39)</text></g><!--entity S4--><g class="entity" data-qualified-name="S4" data-source-line="15" id="ent0005"><rect fill="#E3F2FD" height="69.4648" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="115.2725" x="7" y="118.8383"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="59.7939" x="34.7393" y="142.3734">&#171;source&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="95.2725" x="17" y="158.8617">Payment Txns</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="51.3037" x="17" y="175.35">(SR-40)</text></g><!--entity S5--><g class="entity" data-qualified-name="S5" data-source-line="16" id="ent0006"><rect fill="#E3F2FD" height="69.4648" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="122.4844" x="620.4" y="118.8383"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="59.7939" x="651.7452" y="142.3734">&#171;source&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="102.4844" x="630.4" y="158.8617">File Operations</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="51.3037" x="630.4" y="175.35">(SR-42)</text></g><!--entity S6--><g class="entity" data-qualified-name="S6" data-source-line="17" id="ent0007"><rect fill="#E3F2FD" height="69.4648" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="117.5625" x="777.86" y="118.8383"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="59.7939" x="806.7443" y="142.3734">&#171;source&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="97.5625" x="787.86" y="158.8617">Security Alerts</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="51.3037" x="787.86" y="175.35">(SR-44)</text></g><!--entity FILTER--><g class="entity" data-qualified-name="FILTER" data-source-line="20" id="ent0008"><rect fill="#FFF3E0" height="102.4414" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="209.9912" x="342.64" y="264.7983"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="88.5186" x="403.3763" y="288.3334">&#171;processing&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="168.9775" x="352.64" y="304.8217">LogbackSanitizingFilter</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="189.9912" x="352.64" y="321.31">Strips password, token, cvv,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="182.1982" x="352.64" y="337.7983">secret, authorization fields</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="138.3389" x="352.64" y="354.2866">(SR-45, T-87, T-89)</text></g><!--entity FORMAT--><g class="entity" data-qualified-name="FORMAT" data-source-line="22" id="ent0009"><rect fill="#FFF3E0" height="118.9297" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="230.3486" x="332.47" y="427.2383"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="88.5186" x="403.385" y="450.7734">&#171;processing&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="191.8301" x="342.47" y="467.2617">Structured JSON Formatter</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="210.3486" x="342.47" y="483.75">timestamp, eventType, traceId,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="179.6006" x="342.47" y="500.2383">spanId, userId, machineId,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="196.8887" x="342.47" y="516.7266">entityId, oldValue, newValue,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="57.9688" x="342.47" y="533.2148">sourceIp</text></g><!--entity HMAC--><g class="entity" data-qualified-name="HMAC" data-source-line="24" id="ent0010"><rect fill="#FFF3E0" height="118.9297" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="216.1982" x="339.54" y="606.1683"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="88.5186" x="403.3798" y="629.7034">&#171;processing&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="168.3691" x="349.54" y="646.1917">HMAC-SHA256 Signing</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="196.1982" x="349.54" y="662.68">Dedicated AUDIT_HMAC_KEY</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.7773" x="349.54" y="679.1683">(separate from JWT_SECRET)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="162.4766" x="349.54" y="695.6566">Appended to each entry</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="94.8213" x="349.54" y="712.1448">(SR-34, T-79)</text></g><!--entity STORE--><g class="entity" data-qualified-name="STORE" data-source-line="26" id="ent0011"><rect fill="#E8F5E9" height="118.9297" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="230.8887" x="332.2" y="785.0983"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="65.6318" x="414.8284" y="808.6334">&#171;storage&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="210.8887" x="342.2" y="825.1217">Logback RollingFileAppender</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.7129" x="342.2" y="841.61">/var/vendnet/logs/audit/</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="206.7461" x="342.2" y="858.0983">Daily rotation, .gz after 7 days</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="201.3115" x="342.2" y="874.5866">Deleted after 90 days (FR-27)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="74.3682" x="342.2" y="891.0748">POSIX: 640</text></g><!--entity BINLOG--><g class="entity" data-qualified-name="BINLOG" data-source-line="28" id="ent0012"><rect fill="#E8F5E9" height="102.4414" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="226.4248" x="930.43" y="102.3583"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="65.6318" x="1010.8265" y="125.8934">&#171;storage&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="129.4111" x="940.43" y="142.3817">MySQL Binary Log</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="206.4248" x="940.43" y="158.87">ROW format, 90-day retention</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="108.4248" x="940.43" y="175.3583">Shipped to SIEM</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="94.8213" x="940.43" y="191.8466">(SR-59, T-73)</text></g><!--entity VERIFY--><g class="entity" data-qualified-name="VERIFY" data-source-line="30" id="ent0013"><rect fill="#FCE4EC" height="118.9297" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="246.9258" x="598.18" y="785.0983"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="90.1592" x="676.5633" y="808.6334">&#171;verification&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="193.9287" x="608.18" y="825.1217">Nightly Quartz Verification</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="226.9258" x="608.18" y="841.61">Re-computes HMAC for prior day</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="194.1611" x="608.18" y="858.0983">Mismatch &#8594; Actuator DOWN</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="122.8555" x="608.18" y="874.5866">&#8594; PagerDuty alert</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="94.8213" x="608.18" y="891.0748">(SR-41, T-79)</text></g><!--entity DISK--><g class="entity" data-qualified-name="DISK" data-source-line="32" id="ent0014"><rect fill="#FCE4EC" height="85.9531" rx="2.5" ry="2.5" style="stroke:#546E7A;stroke-width:0.5;" width="156.5479" x="369.37" y="964.0283"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="90.1592" x="402.5643" y="987.5634">&#171;verification&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="125.5693" x="379.37" y="1004.0517">Prometheus Alert</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="136.5479" x="379.37" y="1020.54">Disk &gt; 80% capacity</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="87.2813" x="379.37" y="1037.0283">(T-62, T-83)</text></g><!--link S1 to FILTER--><g class="link" data-entity-1="ent0002" data-entity-2="ent0008" data-link-type="dependency" data-source-line="34" id="lnk15"><path d="M251.98,188.5483 C259.48,194.0783 267.23,199.6683 274.64,204.7983 C303.78,224.9583 331.3266,242.895 360.3266,261.205" fill="none" id="S1-to-FILTER" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="365.4,264.4083,359.9254,256.2212,361.1722,261.7389,355.6544,262.9857,365.4,264.4083" style="stroke:#181818;stroke-width:1;"/></g><!--link S2 to FILTER--><g class="link" data-entity-1="ent0003" data-entity-2="ent0008" data-link-type="dependency" data-source-line="35" id="lnk16"><path d="M383.03,188.5983 C394.31,210.6783 406.4793,234.4857 419.1293,259.2357" fill="none" id="S2-to-FILTER" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="421.86,264.5783,421.3257,254.7439,419.5844,260.1261,414.2023,258.3848,421.86,264.5783" style="stroke:#181818;stroke-width:1;"/></g><!--link S3 to FILTER--><g class="link" data-entity-1="ent0004" data-entity-2="ent0008" data-link-type="dependency" data-sour